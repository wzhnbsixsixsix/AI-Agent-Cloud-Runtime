name: agentforge

x-observability-env: &observability-env
  OTEL_ENABLED: ${OTEL_ENABLED:-true}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-otel-collector:4317}
  METRICS_ENABLED: ${METRICS_ENABLED:-true}
  METRICS_ADDR: ${METRICS_ADDR:-:9090}
  METRICS_PATH: ${METRICS_PATH:-/metrics}

services:
  redis:
    image: redis:7-alpine
    container_name: agentforge-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentforge-postgres
    environment:
      POSTGRES_DB: agentforge
      POSTGRES_USER: agentforge
      POSTGRES_PASSWORD: agentforge
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentforge -d agentforge"]
      interval: 2s
      timeout: 2s
      retries: 30
    restart: unless-stopped

  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: agentforge-etcd
    command:
      - /usr/local/bin/etcd
      - --name=agentforge-etcd
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
    ports:
      - "2379:2379"
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: agentforge-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: agentforge-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: agentforge-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  skilld:
    build:
      context: ..
      dockerfile: build/Dockerfile
      args:
        BIN: skilld
    container_name: agentforge-skilld
    environment:
      <<: *observability-env
      OTEL_SERVICE_NAME: skilld
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      SKILL_GRPC_ADDR: ":8084"
      SKILL_ROOT: ${SKILL_ROOT:-/skills}
      SKILL_TOP_K: ${SKILL_TOP_K:-3}
      ETCD_ENDPOINTS: ${ETCD_ENDPOINTS:-etcd:2379}
      DISCOVERY_ENABLED: ${DISCOVERY_ENABLED:-true}
    ports:
      - "8084:8084"
    restart: unless-stopped

  ragd:
    build:
      context: ..
      dockerfile: build/Dockerfile
      args:
        BIN: ragd
    container_name: agentforge-ragd
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *observability-env
      OTEL_SERVICE_NAME: ragd
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgres://agentforge:agentforge@postgres:5432/agentforge?sslmode=disable}
      RAG_GRPC_ADDR: ":8085"
      RAG_EMBED_DIM: ${RAG_EMBED_DIM:-384}
      ETCD_ENDPOINTS: ${ETCD_ENDPOINTS:-etcd:2379}
      DISCOVERY_ENABLED: ${DISCOVERY_ENABLED:-true}
    ports:
      - "8085:8085"
    restart: unless-stopped

  hookd:
    build:
      context: ..
      dockerfile: build/Dockerfile
      args:
        BIN: hookd
    container_name: agentforge-hookd
    environment:
      <<: *observability-env
      OTEL_SERVICE_NAME: hookd
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      HOOK_GRPC_ADDR: ":8083"
      HOOK_ROOT: ${HOOK_ROOT:-/hooks}
      HOOK_TIMEOUT: ${HOOK_TIMEOUT:-10ms}
      HOOK_FAIL_CLOSED: ${HOOK_FAIL_CLOSED:-false}
      HOOK_MAX_STDOUT_BYTES: ${HOOK_MAX_STDOUT_BYTES:-65536}
      ETCD_ENDPOINTS: ${ETCD_ENDPOINTS:-etcd:2379}
      DISCOVERY_ENABLED: ${DISCOVERY_ENABLED:-true}
    ports:
      - "8083:8083"
    restart: unless-stopped

  gateway:
    build:
      context: ..
      dockerfile: build/Dockerfile
      args:
        BIN: gateway
    container_name: agentforge-gateway
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ragd:
        condition: service_started
    environment:
      <<: *observability-env
      OTEL_SERVICE_NAME: gateway
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgres://agentforge:agentforge@postgres:5432/agentforge?sslmode=disable}
      RAG_ENABLED: ${RAG_ENABLED:-false}
      RAG_EMBED_DIM: ${RAG_EMBED_DIM:-384}
      RAG_TOP_K: ${RAG_TOP_K:-5}
      RAG_TENANT_ID: ${RAG_TENANT_ID:-default}
      RAG_MIN_SCORE: ${RAG_MIN_SCORE:-0}
      RAG_SERVICE_ADDR: ${RAG_SERVICE_ADDR:-ragd:8085}
      SKILL_SERVICE_ADDR: ${SKILL_SERVICE_ADDR:-skilld:8084}
      HOOK_SERVICE_ADDR: ${HOOK_SERVICE_ADDR:-hookd:8083}
      ETCD_ENDPOINTS: ${ETCD_ENDPOINTS:-etcd:2379}
      DISCOVERY_ENABLED: ${DISCOVERY_ENABLED:-true}
      GATEWAY_GRPC_ADDR: ":8080"
      GATEWAY_ACP_ADDR: ":8090"
      GATEWAY_ACP_CACHE_TTL: ${GATEWAY_ACP_CACHE_TTL:-1h}
      GATEWAY_RUN_TIMEOUT: ${GATEWAY_RUN_TIMEOUT:-10m}
      GATEWAY_TOOL_CALL_TIMEOUT: ${GATEWAY_TOOL_CALL_TIMEOUT:-60s}
    ports:
      - "8080:8080"
      - "8090:8090"
    restart: unless-stopped

  controlplane:
    build:
      context: ..
      dockerfile: build/Dockerfile
      args:
        BIN: controlplane
    container_name: agentforge-controlplane
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      gateway:
        condition: service_started
    user: "0:0"
    environment:
      <<: *observability-env
      OTEL_SERVICE_NAME: controlplane
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      REDIS_ADDR: redis:6379
      POSTGRES_DSN: ${POSTGRES_DSN:-postgres://agentforge:agentforge@postgres:5432/agentforge?sslmode=disable}
      GATEWAY_DIAL_ADDR: gateway:8080
      CONTROLPLANE_HTTP_ADDR: ":8086"
      AGENT_DEFAULT_IMAGE: ${AGENT_DEFAULT_IMAGE:-alpine:3.19}
      WEB_DIST_DIR: /web
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8086:8086"
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    container_name: agentforge-web
    depends_on:
      controlplane:
        condition: service_started
    ports:
      - "5173:80"
    restart: unless-stopped

  scheduler:
    build:
      context: ..
      dockerfile: build/Dockerfile
      args:
        BIN: scheduler
    container_name: agentforge-scheduler
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *observability-env
      OTEL_SERVICE_NAME: scheduler
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      ETCD_ENDPOINTS: ${ETCD_ENDPOINTS:-etcd:2379}
      DISCOVERY_ENABLED: ${DISCOVERY_ENABLED:-true}
      SCHEDULER_RAFT_ENABLED: ${SCHEDULER_RAFT_ENABLED:-true}
      SCHEDULER_NODE_ID: ${SCHEDULER_NODE_ID:-scheduler-1}
      SCHEDULER_ADVERTISE_ADDR: ${SCHEDULER_ADVERTISE_ADDR:-scheduler:8081}
      SCHEDULER_GRPC_ADDR: ":8081"
      SCHEDULER_HTTP_ADDR: ":8082"
    ports:
      - "8081:8081"
      - "8082:8082"
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: build/Dockerfile
      args:
        BIN: worker
    depends_on:
      redis:
        condition: service_healthy
      scheduler:
        condition: service_started
      postgres:
        condition: service_healthy
      skilld:
        condition: service_started
      ragd:
        condition: service_started
      hookd:
        condition: service_started
    environment:
      <<: *observability-env
      OTEL_SERVICE_NAME: worker
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgres://agentforge:agentforge@postgres:5432/agentforge?sslmode=disable}
      RAG_ENABLED: ${RAG_ENABLED:-false}
      RAG_EMBED_DIM: ${RAG_EMBED_DIM:-384}
      RAG_TOP_K: ${RAG_TOP_K:-5}
      RAG_TENANT_ID: ${RAG_TENANT_ID:-default}
      RAG_MIN_SCORE: ${RAG_MIN_SCORE:-0}
      RAG_SERVICE_ADDR: ${RAG_SERVICE_ADDR:-ragd:8085}
      SKILL_SERVICE_ADDR: ${SKILL_SERVICE_ADDR:-skilld:8084}
      HOOK_ENABLED: ${HOOK_ENABLED:-false}
      HOOK_SERVICE_ADDR: ${HOOK_SERVICE_ADDR:-hookd:8083}
      HOOK_FAIL_CLOSED: ${HOOK_FAIL_CLOSED:-false}
      HOOK_TIMEOUT: ${HOOK_TIMEOUT:-10ms}
      ETCD_ENDPOINTS: ${ETCD_ENDPOINTS:-etcd:2379}
      DISCOVERY_ENABLED: ${DISCOVERY_ENABLED:-true}
      MULTI_AGENT_ENABLED: ${MULTI_AGENT_ENABLED:-false}
      SUBAGENT_MAX_DEPTH: ${SUBAGENT_MAX_DEPTH:-2}
      SUBAGENT_MAX_CHILDREN: ${SUBAGENT_MAX_CHILDREN:-4}
      SUBAGENT_TIMEOUT: ${SUBAGENT_TIMEOUT:-2m}
      CONTEXT_COMPACT_ENABLED: ${CONTEXT_COMPACT_ENABLED:-true}
      CONTEXT_COMPACT_MAX_CHARS: ${CONTEXT_COMPACT_MAX_CHARS:-24000}
      CONTEXT_COMPACT_KEEP_HEAD: ${CONTEXT_COMPACT_KEEP_HEAD:-4}
      CONTEXT_COMPACT_KEEP_TAIL: ${CONTEXT_COMPACT_KEEP_TAIL:-8}
      SCHEDULER_DIAL_ADDR: scheduler:8081
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      WORKER_CONSUMER_GROUP: ${WORKER_CONSUMER_GROUP:-workers}
      WORKER_HEARTBEAT_SECONDS: ${WORKER_HEARTBEAT_SECONDS:-5s}
      WORKER_MAX_RETRY: ${WORKER_MAX_RETRY:-3}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-glm-4.7-flash}
      OPENAI_MAX_TOKENS: ${OPENAI_MAX_TOKENS:-65536}
      LLM_THINKING_ENABLED: ${LLM_THINKING_ENABLED:-true}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-60s}
      # ---- W3: Sandbox + Tool ----
      # docker driver 需要把宿主 docker.sock 挂进 worker 容器，并在 worker 容器与
      # daemon 之间共享 SANDBOX_WORKSPACE_ROOT 目录路径，否则 daemon 拿不到 bind 源。
      SANDBOX_DRIVER: ${SANDBOX_DRIVER:-docker}
      SANDBOX_IMAGE: ${SANDBOX_IMAGE:-alpine:3.19}
      SANDBOX_POOL_SIZE: ${SANDBOX_POOL_SIZE:-4}
      SANDBOX_WORKSPACE_ROOT: ${SANDBOX_WORKSPACE_ROOT:-/tmp/agentforge}
      SANDBOX_MEMORY_MB: ${SANDBOX_MEMORY_MB:-256}
      SANDBOX_CPU_QUOTA_US: ${SANDBOX_CPU_QUOTA_US:-50000}
      SANDBOX_PIDS_LIMIT: ${SANDBOX_PIDS_LIMIT:-256}
      SANDBOX_EXEC_HARD: ${SANDBOX_EXEC_HARD:-60s}
      SANDBOX_ACQUIRE_TIMEOUT: ${SANDBOX_ACQUIRE_TIMEOUT:-30s}
      TOOL_CONSUMER_GROUP: ${TOOL_CONSUMER_GROUP:-tool-runtime}
      TOOL_CONCURRENCY: ${TOOL_CONCURRENCY:-4}
      TOOL_HTTP_MAX_BYTES: ${TOOL_HTTP_MAX_BYTES:-1048576}
      TOOL_HTTP_ALLOW_LIST: ${TOOL_HTTP_ALLOW_LIST:-}
      AGENT_TOOL_MAX_STEPS: ${AGENT_TOOL_MAX_STEPS:-5}
      # ---- W5: Skill dynamic loading ----
      SKILL_ENABLED: ${SKILL_ENABLED:-true}
      SKILL_ROOT: ${SKILL_ROOT:-/skills}
      SKILL_TOP_K: ${SKILL_TOP_K:-3}
      SKILL_CACHE_TTL: ${SKILL_CACHE_TTL:-10m}
      SKILL_CACHE_SIZE: ${SKILL_CACHE_SIZE:-1024}
    volumes:
      # 让 worker 进程能驱动宿主 docker daemon 拉起 sandbox 容器。
      - /var/run/docker.sock:/var/run/docker.sock
      # 用 bind mount 共享 workspace 根：worker 在容器内 mkdir 的子目录，
      # docker daemon 也能按相同宿主路径挂给 sandbox 容器。
      - ${SANDBOX_WORKSPACE_HOST:-/tmp/agentforge}:${SANDBOX_WORKSPACE_ROOT:-/tmp/agentforge}
    restart: unless-stopped
    deploy:
      replicas: ${WORKER_REPLICAS:-1}
