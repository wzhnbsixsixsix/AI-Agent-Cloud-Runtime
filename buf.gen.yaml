version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/wzhnbsixsixsix/agentforge/pkg/proto/gen
plugins:
  - local: protoc-gen-go
    out: pkg/proto/gen
    opt:
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: pkg/proto/gen
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
