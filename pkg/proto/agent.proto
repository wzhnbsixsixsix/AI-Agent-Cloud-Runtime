syntax = "proto3";

package agentforge.v1;

// AgentService 是 agentctl <-> gateway 的双向流接口。
//   W1: RunAgent
//   W2: 保持消息结构稳定的前提下，增加自研 ACP 协议并行入口
//   W3: 新增 ExecTool / ListTools 用于在不经过 LLM 的情况下直接调用 sandbox tool；
//       function-calling 闭环留给 W4。
service AgentService {
  // RunAgent 客户端发送一条 RunRequest 起会话，服务端回流 RunEvent 直至 Done/Error。
  rpc RunAgent(stream RunRequest) returns (stream RunEvent);

  // ExecTool 直接在 worker 侧的 sandbox 里执行一个 tool，不经过 LLM。
  // 主要用途：调试 / W3 demo；W4 之后会复用同一套 ToolDescriptor 接进 LLM function-calling。
  rpc ExecTool(ExecToolRequest) returns (ExecToolResponse);

  // ListTools 返回 worker 侧已注册的全部 tool 描述（含 JSON Schema）。
  rpc ListTools(ListToolsRequest) returns (ListToolsResponse);

  // IngestRAG 把客户端提交的文本切片、embedding 后写入 RAG store。
  rpc IngestRAG(IngestRAGRequest) returns (IngestRAGResponse);

  // QueryRAG 查询当前 RAG store，主要用于 CLI demo 与调试。
  rpc QueryRAG(QueryRAGRequest) returns (QueryRAGResponse);

  // RunPipeline 按 W7 pipeline YAML 顺序执行多个本地 agent step。
  rpc RunPipeline(PipelineRequest) returns (PipelineResponse);
}

// SkillService 是 W8 拆出的 Skill selector 服务。
service SkillService {
  rpc SelectSkills(SelectSkillsRequest) returns (SelectSkillsResponse);
}

// RAGService 是 W8 拆出的 RAG 服务；AgentService 的 RAG RPC 保持兼容并代理到这里。
service RAGService {
  rpc IngestRAG(IngestRAGRequest) returns (IngestRAGResponse);
  rpc QueryRAG(QueryRAGRequest) returns (QueryRAGResponse);
  rpc RetrieveContext(RetrieveContextRequest) returns (RetrieveContextResponse);
}

// HookService 是 W8 拆出的 Hook 执行服务。
service HookService {
  rpc ExecuteHook(ExecuteHookRequest) returns (ExecuteHookResponse);
  rpc ListHooks(ListHooksRequest) returns (ListHooksResponse);
}

message RunRequest {
  // 客户端可不填，gateway 会生成 ULID。
  string run_id = 1;
  string user_id = 2;
  string prompt = 3;
  // 可选，覆盖默认 model。
  string model = 4;
  // gateway 生成，贯穿全链路。
  string trace_id = 5;
  // 可选：由 Control Plane 创建的持久 Agent 身份。旧客户端保持为空。
  string agent_id = 6;
  // 可选：Control Plane 根据 AgentSpec 注入的角色/system prompt。
  string system_prompt = 7;
}

message RunEvent {
  string run_id = 1;
  string trace_id = 2;
  oneof payload {
    StateChanged state_changed = 10;
    Token        token         = 11;
    Done         done          = 12;
    Error        error         = 13;
  }
}

enum RunState {
  RUN_STATE_UNSPECIFIED = 0;
  RUN_STATE_PENDING = 1;
  RUN_STATE_RUNNING = 2;
  RUN_STATE_WAITING_TOOL = 3;
  RUN_STATE_COMPACTING = 4;
  RUN_STATE_DONE = 5;
  RUN_STATE_FAILED = 6;
}

message StateChanged {
  RunState from = 1;
  RunState to = 2;
  int64 ts_unix_ms = 3;
}

message Token {
  string text = 1;
  int64 index = 2;
}

message Done {
  int64 total_tokens = 1;
  int64 ts_unix_ms = 2;
}

message Error {
  string code = 1;
  string message = 2;
  bool retriable = 3;
}

// ---------- W3: Tool 调用 ----------

message ExecToolRequest {
  string user_id = 1;
  // tool 名字（必须是 ListTools 返回过的）。
  string tool = 2;
  // tool 参数，按对应 ToolDescriptor.parameters_json 的 JSON Schema。
  bytes args_json = 3;
  // 客户端期望的最大执行时长；0 用 server 默认（30s）。
  uint32 timeout_ms = 4;
  // 可选；server 会生成。
  string trace_id = 5;
}

message ExecToolResponse {
  // server 生成；可用于日志关联。
  string call_id = 1;
  // 实际执行该 tool 的容器 id（fs/bash 类）；http_fetch 等 host 工具为空。
  string container_id = 2;
  // sandbox 命令退出码；非沙箱类工具默认 0。
  int32 exit_code = 3;
  // tool 返回内容（文本）。bash 会把 stdout+stderr 合并；fs_read 是文件内容；http_fetch 是 body。
  string content = 4;
  // 业务失败标记（命令非 0 退出、HTTP 4xx/5xx、参数错等）。
  bool is_error = 5;
  // tool.Result.Metadata 序列化后的 JSON。
  bytes metadata_json = 6;
  // 总耗时（ms）。
  uint64 elapsed_ms = 7;
  // 内部异常时填，业务失败用 is_error 不填这里。
  string error_code = 8;
  string error_message = 9;
}

message ListToolsRequest {}

message ListToolsResponse {
  repeated ToolDescriptor tools = 1;
}

message ToolDescriptor {
  string name = 1;
  string description = 2;
  // OpenAI/Anthropic function-calling 兼容的 JSON Schema（Draft 7）字符串。
  string parameters_json = 3;
}

// ---------- W6: RAG ----------

message IngestRAGRequest {
  string tenant_id = 1;
  string source = 2;
  string content = 3;
}

message IngestRAGResponse {
  string tenant_id = 1;
  string source = 2;
  uint32 chunks = 3;
  repeated string chunk_ids = 4;
}

message QueryRAGRequest {
  string tenant_id = 1;
  string query = 2;
  uint32 top_k = 3;
  double min_score = 4;
}

message QueryRAGResponse {
  repeated RAGChunk results = 1;
}

message RAGChunk {
  string tenant_id = 1;
  string source = 2;
  string chunk_id = 3;
  uint32 ordinal = 4;
  string content = 5;
  double score = 6;
  double vector_score = 7;
  double text_score = 8;
}

// ---------- W7: Pipeline ----------

message PipelineRequest {
  string tenant_id = 1;
  string user_id = 2;
  string model = 3;
  string spec_yaml = 4;
  string trace_id = 5;
}

message PipelineResponse {
  string name = 1;
  string status = 2;
  string error = 3;
  repeated PipelineStepResult results = 4;
}

message PipelineStepResult {
  string step_id = 1;
  string role = 2;
  string child_run_id = 3;
  string summary = 4;
  string status = 5;
  string error = 6;
}

// ---------- W8: Skill / RAG / Hook services ----------

message SelectSkillsRequest {
  string query = 1;
  uint32 top_k = 2;
}

message SkillDoc {
  string name = 1;
  string description = 2;
  string sha256 = 3;
  string path = 4;
  string content = 5;
}

message SelectSkillsResponse {
  repeated SkillDoc skills = 1;
}

message RetrieveContextRequest {
  string tenant_id = 1;
  string query = 2;
  uint32 top_k = 3;
  double min_score = 4;
}

message RetrieveContextResponse {
  repeated RAGChunk results = 1;
  string rendered_context = 2;
}

enum HookEvent {
  HOOK_EVENT_UNSPECIFIED = 0;
  HOOK_EVENT_PRE_LLM = 1;
  HOOK_EVENT_POST_LLM = 2;
  HOOK_EVENT_PRE_TOOL_USE = 3;
  HOOK_EVENT_POST_TOOL_USE = 4;
}

message ExecuteHookRequest {
  HookEvent event = 1;
  string run_id = 2;
  string trace_id = 3;
  bytes payload_json = 4;
}

message ExecuteHookResponse {
  bool allowed = 1;
  string reason = 2;
  bytes payload_json = 3;
  repeated string append_system_messages = 4;
  repeated string matched_hooks = 5;
}

message ListHooksRequest {}

message HookInfo {
  string id = 1;
  HookEvent event = 2;
  bool enabled = 3;
  string source = 4;
  string description = 5;
}

message ListHooksResponse {
  repeated HookInfo hooks = 1;
}
