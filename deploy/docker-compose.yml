name: agentforge

services:
  redis:
    image: redis:7-alpine
    container_name: agentforge-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30
    restart: unless-stopped

  gateway:
    build:
      context: ..
      dockerfile: build/Dockerfile
      args:
        BIN: gateway
    container_name: agentforge-gateway
    depends_on:
      redis:
        condition: service_healthy
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      GATEWAY_GRPC_ADDR: ":8080"
      GATEWAY_ACP_ADDR: ":8090"
      GATEWAY_ACP_CACHE_TTL: ${GATEWAY_ACP_CACHE_TTL:-1h}
      GATEWAY_RUN_TIMEOUT: ${GATEWAY_RUN_TIMEOUT:-10m}
    ports:
      - "8080:8080"
      - "8090:8090"
    restart: unless-stopped

  scheduler:
    build:
      context: ..
      dockerfile: build/Dockerfile
      args:
        BIN: scheduler
    container_name: agentforge-scheduler
    depends_on:
      redis:
        condition: service_healthy
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      SCHEDULER_GRPC_ADDR: ":8081"
      SCHEDULER_HTTP_ADDR: ":8082"
    ports:
      - "8081:8081"
      - "8082:8082"
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: build/Dockerfile
      args:
        BIN: worker
    depends_on:
      redis:
        condition: service_healthy
      scheduler:
        condition: service_started
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      SCHEDULER_DIAL_ADDR: scheduler:8081
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      WORKER_CONSUMER_GROUP: ${WORKER_CONSUMER_GROUP:-workers}
      WORKER_HEARTBEAT_SECONDS: ${WORKER_HEARTBEAT_SECONDS:-5s}
      WORKER_MAX_RETRY: ${WORKER_MAX_RETRY:-3}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-60s}
    restart: unless-stopped
    deploy:
      replicas: ${WORKER_REPLICAS:-1}
